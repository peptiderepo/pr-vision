name: Deploy to WordPress

on:
  push:
    branches: [ main ]

# contents: write required so the ci.yml caller can pass write permission
# through to the phpcbf auto-commit step in the reusable workflow.
permissions:
  contents: write

concurrency:
  group: deploy-pr-vision
  cancel-in-progress: true

jobs:
  test:
    name: Pre-deploy tests
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy (shared pipeline)
    needs: test
    uses: peptide-repo/peptide-e2e/.github/workflows/deploy-app.yml@main
    with:
      target_path: wp-content/plugins/pr-vision
    secrets: inherit
